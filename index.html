<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Quotes</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="quotes">
      <h1 class="quotes__title">Random Quotes (OOP)</h1>
      <div class="quotes__container">
        <p class="quotes__text">
          Here will be one of the famous quotes from the popular author
        </p>

        <p class="quotes__author">Click the button</p>

        <button class="quotes__btn quotes__btn--primary">
          Choose random quote <i class="fa fa-random"></i>
        </button>

        <button class="quotes__btn quotes__btn--secondary quotes__btn--api">
          Get random quote via API <i class="fa fa-globe"></i>
        </button>
      </div>
    </div>
    <script type="module" src="index.js"></script>
  </body>
</html>
